<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CadastroAPI</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="box">
        <h1>
            Cadastro
        </h1>   
        <form action="">
            <input type="text" class="nome" name="nome" placeholder="Nome">
            <input type="text" class="email" name="email" placeholder="E-mail">
            <input type="password" class="senha" name="Senha" placeholder="Senha">
            <input type="text" class="telefone" name="telefone" placeholder="Telefone">
            <button>Cadasrar</button>
        </form>  
    </div>
</body>
</html>
